<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Box</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}
header{
    background:#e50914;
    padding:20px;
    font-size:30px;
    font-weight:bold;
}
.container{
    padding:30px;
}
.movie{
    background:#222;
    border-radius:10px;
    padding:20px;
    margin:20px auto;
    max-width:350px;
}
img{
    width:100%;
    border-radius:10px;
}
button{
    margin-top:15px;
    padding:12px 25px;
    background:#e50914;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#b20710;
}
footer{
    margin-top:40px;
    padding:20px;
    color:#aaa;
}
</style>

</head>
<body>

<header>🎬 Movie Box</header>

<div class="container">

<div class="movie">
<img src="https://via.placeholder.com/350x200.png?text=Movie+Poster" alt="Movie">
<h2>Sample Movie</h2>
<p>Click below to watch.</p>

<button onclick="alert('Video link will be added later!')">
▶ Watch Now
</button>

</div>

</div>

<footer>
© 2026 Movie Box
</footer>

</body>
</html>
